<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Learning System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><i class="fas fa-graduation-cap"></i> <strong>EduLearn</strong></div>
            <div class="nav-container">
                <ul id="nav-links">
                    <li><a href="#" id="home-link">Home</a></li>
                    <li><a href="#" id="courses-link">Courses</a></li>
                </ul>
                <div id="auth-links" class="auth-section">
                    <!-- Dynamic user content will be injected here -->
                </div>
            </div>
        </nav>
    </header>

    <main id="app">
        <!-- Content will be dynamically loaded here -->
        <section class="hero">
            <h1>Welcome to University Learning System</h1>
            <p>Empowering students and instructors with a modern learning experience.</p>
            <button class="cta-btn" id="browse-courses-btn">Browse Courses</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 University Learning System. All rights reserved.</p>
    </footer>

    <!-- Modals -->
    <div id="modal-container" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
